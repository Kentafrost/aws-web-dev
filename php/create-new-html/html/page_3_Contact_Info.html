<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Contact Info</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background-color: #f5f5f5; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        h1 { color: #333; }
        p { line-height: 1.6; }
        .url { color: #0066cc; text-decoration: underline; }
        .description { font-style: italic; margin-top: 20px; }
    
    </style>
</head>
<body>
    <h1>Contact Info</h1>
    <p>Get in touch with us through various communication channels.</p>
    <p class='url'>URL: <a href='https://example.com/contact' target='_blank'>https://example.com/contact</a></p>
    <p class='description'>Contact information and support details</p>
</body>
</html>
